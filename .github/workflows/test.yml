name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: cli

      - name: Run CLI tests
        run: bun test
        working-directory: cli

      - name: Install Neovim
        run: sudo apt-get update && sudo apt-get install -y neovim

      - name: Run Neovim Lua tests
        run: nvim --headless -u NONE --cmd "set rtp^=$PWD" +'luafile tests/context_picker_spec.lua' +qa
